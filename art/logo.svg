<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 108 108">
  <!-- Dark rounded square background -->
  <rect x="2" y="2" width="104" height="104" rx="22" ry="22" fill="#1A1A1A"/>

  <!-- Document outline -->
  <path d="M38,30 L60,30 L72,42 L72,78 C72,80 70,82 68,82 L38,82 C36,82 34,80 34,78 L34,34 C34,32 36,30 38,30 Z"
        stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" fill="none"/>

  <!-- Folded corner -->
  <path d="M60,30 L60,42 L72,42"
        stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" fill="none"/>

  <!-- Left sound waves -->
  <line x1="24" y1="46" x2="24" y2="62" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="16" y2="58" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right sound waves -->
  <line x1="84" y1="46" x2="84" y2="62" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="92" y1="50" x2="92" y2="58" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Text stripes on document -->
  <line x1="44" y1="52" x2="62" y2="52" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="62" x2="62" y2="62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="72" x2="54" y2="72" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
</svg>
